
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GateGuard — College Vehicle Monitor</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&family=Share+Tech+Mono&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root {
  --bg:#080b12;
  --surface:#0e1220;
  --border:#1a2035;
  --cyan:#00d4ff;
  --cyan-dim:rgba(0,212,255,.12);
  --green:#00e676;
  --red:#ff3d5a;
  --text:#c8d6e8;
  --muted:#5a6a82;
  --font-ui:'DM Sans', sans-serif;
  --font-tech:'Orbitron', sans-serif;
  --font-mono:'Share Tech Mono', monospace;
}

* {
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body {
  background:
    linear-gradient(rgba(8,11,18,.82), rgba(8,11,18,.9)),
    url('/static/images/1.jpg') center/cover no-repeat fixed;

  background-color:var(--bg);
  color:var(--text);
  font-family:var(--font-ui);
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
}

.card {
  width:420px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:6px;
  overflow:hidden;
}

.card-header {
  padding:30px;
  border-bottom:1px solid var(--border);
  text-align:center;
}

.logo-text {
  font-family:var(--font-tech);
  color:var(--cyan);
  font-size:24px;
  letter-spacing:3px;
  font-weight:800;
}

.logo-sub {
  color:var(--muted);
  font-size:11px;
  margin-top:8px;
  letter-spacing:2px;
}

.tab-row {
  display:flex;
}

.tab-btn {
  flex:1;
  padding:14px;
  border:none;
  background:transparent;
  color:var(--muted);
  font-family:var(--font-tech);
  cursor:pointer;
  border-bottom:2px solid transparent;
}

.tab-btn.active {
  color:var(--cyan);
  border-bottom-color:var(--cyan);
  background:var(--cyan-dim);
}

.card-body {
  padding:30px;
}

.panel {
  display:none;
}

.panel.active {
  display:block;
}

.form-group {
  margin-bottom:18px;
}

label {
  display:block;
  margin-bottom:8px;
  font-size:11px;
  color:var(--muted);
  letter-spacing:1px;
  text-transform:uppercase;
  font-family:var(--font-mono);
}

input,
select {
  width:100%;
  padding:12px;
  background:rgba(0,0,0,.3);
  border:1px solid var(--border);
  border-radius:4px;
  color:var(--text);
  font-family:var(--font-mono);
}

input:focus,
select:focus {
  outline:none;
  border-color:var(--cyan);
}

.row-2 {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}

.btn-primary {
  width:100%;
  padding:14px;
  border:none;
  border-radius:4px;
  background:var(--cyan);
  color:#000;
  font-family:var(--font-tech);
  font-weight:700;
  cursor:pointer;
}

.btn-primary:hover {
  opacity:.9;
}

.error-msg {
  background:rgba(255,61,90,.1);
  color:var(--red);
  border:1px solid rgba(255,61,90,.3);
  padding:10px;
  border-radius:4px;
  margin-bottom:16px;
  display:none;
}

.success-msg {
  background:rgba(0,230,118,.1);
  color:var(--green);
  border:1px solid rgba(0,230,118,.3);
  padding:10px;
  border-radius:4px;
  margin-bottom:16px;
  display:none;
}

.default-hint {
  margin-top:18px;
  text-align:center;
  color:var(--muted);
  font-size:12px;
}

.spinner {
  display:inline-block;
  width:14px;
  height:14px;
  border:2px solid rgba(0,0,0,.2);
  border-top-color:#000;
  border-radius:50%;
  animation:spin .6s linear infinite;
  margin-right:8px;
}

@keyframes spin {
  to {
    transform:rotate(360deg);
  }
}
</style>
</head>

<body>

<div class="card">

  <div class="card-header">

    <div style="display:flex;flex-direction:column;align-items:center;gap:12px;">

      <img src="/static/images/logo.jpg"
           alt="College Logo"
           style="width:90px;height:90px;object-fit:contain;border-radius:50%;border:2px solid var(--cyan);padding:6px;background:rgba(255,255,255,.05);box-shadow:0 0 20px rgba(0,212,255,.25);">

      <div class="logo-text">
        GATEGUARD
      </div>

    </div>

    <div class="logo-sub">
      COLLEGE VEHICLE MONITORING SYSTEM
    </div>

  </div>

  <div class="tab-row">

    <button class="tab-btn active"
            onclick="switchTab('login', this)">
      LOGIN
    </button>

    <button class="tab-btn"
            onclick="switchTab('register', this)">
      REGISTER
    </button>

  </div>

  <div class="card-body">

    <!-- LOGIN -->

    <div id="panel-login"
         class="panel active">

      <div class="error-msg"
           id="login-error"></div>

      <div class="form-group">

        <label>Email Address</label>

        <input type="email"
               id="login-email"
               placeholder="you@college.edu">

      </div>

      <div class="form-group">

        <label>Password</label>

        <input type="password"
               id="login-pass"
               placeholder="••••••••">

      </div>

      <button class="btn-primary"
              id="login-btn"
              onclick="doLogin()">

        AUTHENTICATE

      </button>

      <div class="default-hint">

        Admin Login:<br>
        admin@college.edu / admin123

      </div>

    </div>

    <!-- REGISTER -->

    <div id="panel-register"
         class="panel">

      <div class="error-msg"
           id="reg-error"></div>

      <div class="success-msg"
           id="reg-success"></div>

      <div class="row-2">

        <div class="form-group">

          <label>Full Name</label>

          <input type="text"
                 id="reg-name"
                 placeholder="Rahul Sharma">

        </div>

        <div class="form-group">

          <label>ID Number</label>

          <input type="text"
                 id="reg-sid"
                 placeholder="21CS001">

        </div>

      </div>

      <div class="form-group">

        <label>Email Address</label>

        <input type="email"
               id="reg-email"
               placeholder="user@college.edu">

      </div>

      <div class="form-group">

        <label>Register As</label>

        <select id="register-role">

          <option value="student">
            Student
          </option>

          <option value="faculty">
            Faculty
          </option>

        </select>

      </div>

      <div class="row-2">

        <div class="form-group">

          <label>Phone</label>

          <input type="tel"
                 id="reg-phone"
                 placeholder="9876543210">

        </div>

        <div class="form-group">

          <label>Password</label>

          <input type="password"
                 id="reg-pass"
                 placeholder="Minimum 6 characters">

        </div>

      </div>

      <button class="btn-primary"
              id="reg-btn"
              onclick="doRegister()">

        CREATE ACCOUNT

      </button>

    </div>

  </div>

</div>

<script>

function switchTab(tab, btn) {

  document
    .querySelectorAll('.panel')
    .forEach(p => p.classList.remove('active'));

  document
    .querySelectorAll('.tab-btn')
    .forEach(b => b.classList.remove('active'));

  document
    .getElementById('panel-' + tab)
    .classList.add('active');

  btn.classList.add('active');
}

async function doLogin() {

  const email =
    document.getElementById('login-email')
    .value.trim();

  const password =
    document.getElementById('login-pass')
    .value;

  const err =
    document.getElementById('login-error');

  const btn =
    document.getElementById('login-btn');

  err.style.display = 'none';

  if (!email || !password) {

    showError(err,
      'All fields are required');

    return;
  }

  btn.disabled = true;

  btn.innerHTML =
    '<span class="spinner"></span>AUTHENTICATING...';

  try {

    const res = await fetch('/api/auth/login', {

      method:'POST',

      headers:{
        'Content-Type':'application/json'
      },

      body: JSON.stringify({
        email,
        password
      })
    });

    const data = await res.json();

    if (data.success) {

      btn.innerHTML = 'ACCESS GRANTED';

      setTimeout(() => {

        window.location =
          data.role === 'admin'
          ? '/admin'
          : '/student';

      }, 500);

    } else {

      showError(err,
        data.error || 'Invalid credentials');

      btn.disabled = false;

      btn.innerHTML = 'AUTHENTICATE';
    }

  } catch (e) {

    showError(err,
      'Connection error');

    btn.disabled = false;

    btn.innerHTML = 'AUTHENTICATE';
  }
}

async function doRegister() {

  const name =
    document.getElementById('reg-name')
    .value.trim();

  const student_id =
    document.getElementById('reg-sid')
    .value.trim();

  const email =
    document.getElementById('reg-email')
    .value.trim();

  const phone =
    document.getElementById('reg-phone')
    .value.trim();

  const password =
    document.getElementById('reg-pass')
    .value;

  const role =
    document.getElementById('register-role')
    .value;

  const err =
    document.getElementById('reg-error');

  const suc =
    document.getElementById('reg-success');

  const btn =
    document.getElementById('reg-btn');

  err.style.display = 'none';
  suc.style.display = 'none';

  if (!name || !email || !password) {

    showError(err,
      'Required fields missing');

    return;
  }

  btn.disabled = true;

  btn.innerHTML =
    '<span class="spinner"></span>REGISTERING...';

  try {

    const res = await fetch('/api/auth/register', {

      method:'POST',

      headers:{
        'Content-Type':'application/json'
      },

      body: JSON.stringify({

        name,
        student_id,
        email,
        phone,
        password,
        role

      })
    });

    const data = await res.json();

    if (data.success) {

      suc.textContent =
        'Account created successfully';

      suc.style.display = 'block';

      btn.disabled = false;

      btn.innerHTML = 'CREATE ACCOUNT';

    } else {

      showError(err,
        data.error || 'Registration failed');

      btn.disabled = false;

      btn.innerHTML = 'CREATE ACCOUNT';
    }

  } catch (e) {

    showError(err,
      'Connection error');

    btn.disabled = false;

    btn.innerHTML = 'CREATE ACCOUNT';
  }
}

function showError(el, msg) {

  el.textContent = msg;
  el.style.display = 'block';
}


// ── background slideshow ──

const bgImages = [
  '/static/images/1.jpg',
  '/static/images/2.jpg',
  '/static/images/3.jpg',
  '/static/images/4.jpg',
  '/static/images/5.jpg',
  '/static/images/6.jpg'
];

let bgIndex = 0;

function changeBackground() {

  bgIndex = (bgIndex + 1) % bgImages.length;

  document.body.style.background = `
    linear-gradient(rgba(8,11,18,.82), rgba(8,11,18,.9)),
    url('${bgImages[bgIndex]}') center/cover no-repeat fixed
  `;
}

setInterval(changeBackground, 5000);

</script>

</body>
</html>
