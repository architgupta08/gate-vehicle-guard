<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GateGuard — College Vehicle Monitor</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&family=Share+Tech+Mono&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #080b12;
    --surface:   #0e1220;
    --border:    #1a2035;
    --cyan:      #00d4ff;
    --cyan-dim:  rgba(0,212,255,.12);
    --amber:     #ffb300;
    --green:     #00e676;
    --red:       #ff3d5a;
    --text:      #c8d6e8;
    --muted:     #5a6a82;
    --font-ui:   'DM Sans', sans-serif;
    --font-tech: 'Orbitron', sans-serif;
    --font-mono: 'Share Tech Mono', monospace;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-ui);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* ── animated grid background ── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(0,212,255,.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,.04) 1px, transparent 1px);
    background-size: 60px 60px;
    animation: gridScroll 20s linear infinite;
    pointer-events: none;
  }
  @keyframes gridScroll { to { background-position: 60px 60px; } }

  /* ── radial glow ── */
  body::after {
    content: '';
    position: fixed;
    width: 600px; height: 600px;
    border-radius: 50%;
    background: radial-gradient(ellipse, rgba(0,212,255,.07) 0%, transparent 70%);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
  }

  /* ── scan line overlay ── */
  .scanlines {
    position: fixed; inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,.07) 2px,
      rgba(0,0,0,.07) 4px
    );
    pointer-events: none;
    z-index: 999;
  }

  /* ── corner decorations ── */
  .corner {
    position: fixed;
    width: 80px; height: 80px;
    border-color: var(--cyan);
    border-style: solid;
    opacity: .35;
  }
  .corner-tl { top:20px; left:20px;  border-width: 2px 0 0 2px; }
  .corner-tr { top:20px; right:20px; border-width: 2px 2px 0 0; }
  .corner-bl { bottom:20px; left:20px;  border-width: 0 0 2px 2px; }
  .corner-br { bottom:20px; right:20px; border-width: 0 2px 2px 0; }

  /* ── card ── */
  .card {
    position: relative;
    z-index: 10;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    width: 420px;
    padding: 0;
    box-shadow: 0 0 60px rgba(0,212,255,.06), 0 30px 60px rgba(0,0,0,.5);
    animation: fadeUp .6s ease both;
  }
  @keyframes fadeUp {
    from { opacity:0; transform: translateY(24px); }
    to   { opacity:1; transform: translateY(0); }
  }

  .card-header {
    padding: 36px 36px 28px;
    border-bottom: 1px solid var(--border);
    text-align: center;
  }
  .logo-badge {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 20px;
  }
  .logo-icon {
    width: 40px; height: 40px;
    border: 2px solid var(--cyan);
    border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    background: var(--cyan-dim);
    font-size: 18px;
  }
  .logo-text {
    font-family: var(--font-tech);
    font-size: 20px;
    font-weight: 800;
    color: var(--cyan);
    letter-spacing: 3px;
  }
  .logo-sub {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 4px;
  }

  .tab-row {
    display: flex;
    gap: 0;
  }
  .tab-btn {
    flex: 1;
    padding: 14px;
    background: transparent;
    border: none;
    border-bottom: 2px solid transparent;
    color: var(--muted);
    font-family: var(--font-tech);
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all .2s;
  }
  .tab-btn.active {
    color: var(--cyan);
    border-bottom-color: var(--cyan);
    background: var(--cyan-dim);
  }

  .card-body { padding: 32px 36px 36px; }

  /* ── form panels ── */
  .panel { display: none; }
  .panel.active { display: block; }

  .form-group { margin-bottom: 20px; }
  label {
    display: block;
    font-size: 11px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
    font-family: var(--font-mono);
  }
  input, select {
    width: 100%;
    background: rgba(0,0,0,.3);
    border: 1px solid var(--border);
    border-radius: 3px;
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 14px;
    padding: 12px 14px;
    outline: none;
    transition: border-color .2s, box-shadow .2s;
  }
  input:focus, select:focus {
    border-color: var(--cyan);
    box-shadow: 0 0 0 3px rgba(0,212,255,.1);
  }
  input::placeholder { color: var(--muted); }

  .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

  .btn-primary {
    width: 100%;
    padding: 14px;
    background: var(--cyan);
    border: none;
    border-radius: 3px;
    color: #000;
    font-family: var(--font-tech);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    cursor: pointer;
    margin-top: 8px;
    transition: all .2s;
    position: relative;
    overflow: hidden;
  }
  .btn-primary:hover {
    background: #33deff;
    box-shadow: 0 0 24px rgba(0,212,255,.4);
  }
  .btn-primary:active { transform: scale(.98); }
  .btn-primary:disabled { opacity: .5; cursor: not-allowed; }

  .error-msg {
    background: rgba(255,61,90,.12);
    border: 1px solid rgba(255,61,90,.3);
    border-radius: 3px;
    color: var(--red);
    font-size: 13px;
    padding: 10px 14px;
    margin-bottom: 18px;
    display: none;
    font-family: var(--font-mono);
  }
  .success-msg {
    background: rgba(0,230,118,.1);
    border: 1px solid rgba(0,230,118,.3);
    border-radius: 3px;
    color: var(--green);
    font-size: 13px;
    padding: 10px 14px;
    margin-bottom: 18px;
    display: none;
    font-family: var(--font-mono);
  }

  .role-select {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
  }
  .role-opt {
    flex: 1;
    padding: 10px;
    border: 1px solid var(--border);
    border-radius: 3px;
    text-align: center;
    cursor: pointer;
    font-size: 12px;
    font-family: var(--font-mono);
    color: var(--muted);
    transition: all .2s;
    user-select: none;
  }
  .role-opt.selected {
    border-color: var(--cyan);
    color: var(--cyan);
    background: var(--cyan-dim);
  }

  .divider {
    text-align: center;
    font-size: 11px;
    color: var(--muted);
    margin: 18px 0;
    font-family: var(--font-mono);
    letter-spacing: 1px;
    position: relative;
  }
  .divider::before, .divider::after {
    content: '';
    position: absolute;
    top: 50%;
    width: 35%;
    height: 1px;
    background: var(--border);
  }
  .divider::before { left: 0; }
  .divider::after  { right: 0; }

  .default-hint {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--muted);
    text-align: center;
    margin-top: 18px;
    line-height: 1.8;
  }
  .default-hint span { color: var(--amber); }

  /* blinking cursor */
  .blink {
    animation: blink 1s step-end infinite;
    color: var(--cyan);
    font-family: var(--font-mono);
  }
  @keyframes blink { 50% { opacity: 0; } }

  /* loading spinner */
  .spinner {
    display: inline-block;
    width: 14px; height: 14px;
    border: 2px solid rgba(0,0,0,.3);
    border-top-color: #000;
    border-radius: 50%;
    animation: spin .6s linear infinite;
    vertical-align: middle;
    margin-right: 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* status bar */
  .status-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    padding: 8px 20px;
    background: rgba(8,11,18,.9);
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--muted);
    z-index: 100;
    backdrop-filter: blur(8px);
  }
  .status-dot {
    display: inline-block;
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--green);
    margin-right: 6px;
    box-shadow: 0 0 6px var(--green);
    animation: pulse 2s ease infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:.4;} }
</style>
</head>
<body>
<div class="scanlines"></div>
<div class="corner corner-tl"></div>
<div class="corner corner-tr"></div>
<div class="corner corner-bl"></div>
<div class="corner corner-br"></div>

<div class="card">
  <div class="card-header">
    <div class="logo-badge">
      <div class="logo-icon">🚗</div>
      <div>
        <div class="logo-text">GATEGUARD</div>
        <div class="logo-sub">Vehicle Monitoring System</div>
      </div>
    </div>
    <div class="tab-row">
      <button class="tab-btn active" onclick="switchTab('login')">LOGIN</button>
      <button class="tab-btn"        onclick="switchTab('register')">REGISTER</button>
    </div>
  </div>

  <div class="card-body">

    <!-- ── LOGIN ── -->
    <div id="panel-login" class="panel active">
      <div class="error-msg" id="login-error"></div>

      <div class="role-select">
        <div class="role-opt selected" data-role="student" onclick="selectRole('student', this)">👤 STUDENT</div>
        <div class="role-opt"          data-role="admin"   onclick="selectRole('admin',   this)">🛡 ADMIN</div>
      </div>

      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="login-email" placeholder="you@college.edu" autocomplete="email">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password">
      </div>

      <button class="btn-primary" id="login-btn" onclick="doLogin()">
        AUTHENTICATE
      </button>

      <div class="default-hint">
        Admin default: <span>admin@college.edu</span> / <span>admin123</span>
      </div>
    </div>

    <!-- ── REGISTER ── -->
    <div id="panel-register" class="panel">
      <div class="error-msg"   id="reg-error"></div>
      <div class="success-msg" id="reg-success"></div>

      <div class="row-2">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="reg-name" placeholder="Rahul Sharma">
        </div>
        <div class="form-group">
          <label>Student ID</label>
          <input type="text" id="reg-sid" placeholder="21CS001">
        </div>
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="reg-email" placeholder="student@college.edu">
      </div>
      <div class="row-2">
        <div class="form-group">
          <label>Phone</label>
          <input type="tel" id="reg-phone" placeholder="9876543210">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="reg-pass" placeholder="Min 6 chars">
        </div>
      </div>

      <button class="btn-primary" id="reg-btn" onclick="doRegister()">
        CREATE ACCOUNT
      </button>
    </div>

  </div><!-- card-body -->
</div><!-- card -->

<div class="status-bar">
  <span><span class="status-dot"></span>SYSTEM ONLINE</span>
  <span id="clock" class="blink"></span>
  <span>GATEGUARD v2.0</span>
</div>

<script>
  let selectedRole = 'student';

  // ── clock ──
  function tick() {
    document.getElementById('clock').textContent =
      new Date().toLocaleTimeString('en-IN', {hour12: false});
  }
  tick();
  setInterval(tick, 1000);

  // ── tabs ──
  function switchTab(tab) {
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('panel-' + tab).classList.add('active');
    event.currentTarget.classList.add('active');
  }

  // ── role selector ──
  function selectRole(role, el) {
    document.querySelectorAll('.role-opt').forEach(r => r.classList.remove('selected'));
    el.classList.add('selected');
    selectedRole = role;
    if (role === 'admin') {
      document.getElementById('login-email').value = 'admin@college.edu';
      document.getElementById('login-pass').value  = '';
    } else {
      document.getElementById('login-email').value = '';
      document.getElementById('login-pass').value  = '';
    }
  }

  // ── login ──
  async function doLogin() {
    const email = document.getElementById('login-email').value.trim();
    const pass  = document.getElementById('login-pass').value;
    const btn   = document.getElementById('login-btn');
    const err   = document.getElementById('login-error');

    err.style.display = 'none';
    if (!email || !pass) { showError(err, '⚠ All fields required'); return; }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>AUTHENTICATING...';

    try {
      const res  = await fetch('/api/auth/login', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({email, password: pass})
      });
      const data = await res.json();

      if (data.success) {
        btn.innerHTML = '✓ ACCESS GRANTED';
        btn.style.background = 'var(--green)';
        setTimeout(() => {
          window.location = data.role === 'admin' ? '/admin' : '/student';
        }, 600);
      } else {
        showError(err, data.error || 'Authentication failed');
        btn.disabled = false;
        btn.innerHTML = 'AUTHENTICATE';
      }
    } catch (e) {
      showError(err, 'Connection error – try again');
      btn.disabled = false;
      btn.innerHTML = 'AUTHENTICATE';
    }
  }

  // ── register ──
  async function doRegister() {
    const name  = document.getElementById('reg-name').value.trim();
    const sid   = document.getElementById('reg-sid').value.trim();
    const email = document.getElementById('reg-email').value.trim();
    const phone = document.getElementById('reg-phone').value.trim();
    const pass  = document.getElementById('reg-pass').value;
    const btn   = document.getElementById('reg-btn');
    const err   = document.getElementById('reg-error');
    const suc   = document.getElementById('reg-success');

    err.style.display = suc.style.display = 'none';
    if (!name || !email || !pass) { showError(err, '⚠ Name, email & password are required'); return; }
    if (pass.length < 6)          { showError(err, '⚠ Password must be at least 6 characters'); return; }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>REGISTERING...';

    try {
      const res  = await fetch('/api/auth/register', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({name, student_id: sid, email, phone, password: pass})
      });
      const data = await res.json();

      if (data.success) {
        suc.textContent = '✓ Account created – you can now log in';
        suc.style.display = 'block';
        btn.innerHTML = 'CREATE ACCOUNT';
        btn.disabled  = false;
        // clear fields
        ['reg-name','reg-sid','reg-email','reg-phone','reg-pass'].forEach(id => {
          document.getElementById(id).value = '';
        });
        setTimeout(() => switchTab('login'), 2000);
      } else {
        showError(err, data.error || 'Registration failed');
        btn.disabled = false;
        btn.innerHTML = 'CREATE ACCOUNT';
      }
    } catch (e) {
      showError(err, 'Connection error');
      btn.disabled = false;
      btn.innerHTML = 'CREATE ACCOUNT';
    }
  }

  function showError(el, msg) {
    el.textContent = msg;
    el.style.display = 'block';
  }

  // enter key triggers login
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      const panel = document.querySelector('.panel.active').id;
      if (panel === 'panel-login') doLogin();
      else doRegister();
    }
  });
</script>
</body>
</html>
